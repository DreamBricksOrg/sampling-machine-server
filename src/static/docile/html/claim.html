<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docile - RETIRE</title>
    <link rel="stylesheet" href="/templates/docile/css/docile-root.css">
    <link rel="stylesheet" href="/templates/docile/css/claim.css">
</head>

<body>
    <div class="container">

        <div class="header">
            <img src="/templates/docile/assets/images/docile_logo.png" alt="Docile Logo">
        </div>

        <div class="text-content">
            <p>RETIRE SUA</p>
            <p>AMOSTRA</p>
            <p>NO TOTEM AO LADO</p>
        </div>


    </div>

    <script>
        async function completeSession() {
            try {
                const sessionId = localStorage.getItem('session_id') || 'default-session-id';
                const slug = localStorage.getItem('slug') || 'default-slug';

                const payload = {
                    session_id: sessionId,
                    slug: slug
                };

                const response = await fetch('/api/docile/session/complete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    console.log('Session completed successfully');
                } else {
                    console.warn('Failed to complete session:', response.status);
                }
            } catch (error) {
                console.error('Error completing session:', error);
            }
        }

        // Executa quando a página carrega
        document.addEventListener('DOMContentLoaded', function () {
            completeSession();
        });
    </script>
</body>

</html>
