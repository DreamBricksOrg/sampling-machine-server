<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Machine - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --border: #e0e0e0;
            --text: #1a1a1a;
            --muted: #6b7280;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            width: 100%;
            max-width: 420px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: .02em;
            color: var(--text);
        }

        .header p {
            font-size: .82rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .stat-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat {
            background: var(--bg);
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-size: .65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-top: 5px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 0 0 24px;
        }

        .section-title {
            font-size: .72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        input[type="number"],
        input[type="text"] {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: .9rem;
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color .15s;
        }

        input[type="number"]:focus,
        input[type="text"]:focus { border-color: var(--accent); }

        input::placeholder { color: var(--border); }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: .88rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .15s, transform .1s;
            white-space: nowrap;
        }

        .btn:active { transform: scale(.98); }
        .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

        .btn-block {
            width: 100%;
            padding: 11px;
            font-size: .9rem;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Painel de Administracao</h1>
            <p>Sample Machine</p>
        </div>

        <div class="stat-row">
            <div class="stat">
                <div class="stat-value" id="current-quantity">—</div>
                <div class="stat-label">Estoque</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="total-dispensed">—</div>
                <div class="stat-label">Dispensados</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="last-updated">—</div>
                <div class="stat-label">Atualizado</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="section-title">Abastecer</div>
        <div class="input-group">
            <input type="number" id="new-quantity" placeholder="Nova quantidade" min="0">
            <button class="btn btn-primary" onclick="restockProduct()">Salvar</button>
        </div>

        <div class="section-title">Dispensar por valor</div>
        <div class="input-group">
            <input type="text" id="serial-message" placeholder="Mensagem serial (ex: 1)">
            <button class="btn btn-primary" id="drop-value-button" onclick="dropValue()">Dispensar</button>
        </div>
    </div>

    <script>
        let inventoryData = { current_quantity: 0, total_dispensed: 0, last_updated: null };

        async function loadInventory() {
            try {
                const r = await fetch('/api/sample/admin/inventory');
                if (r.ok) {
                    inventoryData = { ...inventoryData, ...await r.json() };
                    updateDisplay();
                }
            } catch (_) {}
        }

        function updateDisplay() {
            document.getElementById('current-quantity').textContent = inventoryData.current_quantity ?? '—';
            document.getElementById('total-dispensed').textContent = inventoryData.total_dispensed ?? '—';
            if (inventoryData.last_updated) {
                const d = new Date(inventoryData.last_updated);
                document.getElementById('last-updated').textContent =
                    d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }) + ' ' +
                    d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            } else {
                document.getElementById('last-updated').textContent = '—';
            }
        }

        async function restockProduct() {
            const qty = parseInt(document.getElementById('new-quantity').value);
            if (isNaN(qty) || qty < 0) {
                return Swal.fire({ icon: 'warning', title: 'Quantidade invalida', confirmButtonText: 'OK' });
            }
            try {
                const r = await fetch('/api/sample/admin/inventory', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_quantity: qty, total_dispensed: inventoryData.total_dispensed || 0 })
                });
                if (!r.ok) throw new Error();
                await loadInventory();
                document.getElementById('new-quantity').value = '';
                Swal.fire({ icon: 'success', title: 'Estoque atualizado!', confirmButtonText: 'OK' });
            } catch (_) {
                Swal.fire({ icon: 'error', title: 'Erro ao salvar', confirmButtonText: 'OK' });
            }
        }

        async function dropValue() {
            const message = document.getElementById('serial-message').value.trim();
            if (!message) {
                return Swal.fire({ icon: 'warning', title: 'Informe a mensagem serial', confirmButtonText: 'OK' });
            }

            const btn = document.getElementById('drop-value-button');
            btn.textContent = 'Aguardando...';
            btn.disabled = true;
            try {
                const r = await fetch('/api/sample/admin/dispense', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await r.json();
                if (r.ok) {
                    await loadInventory();
                    Swal.fire({ icon: 'success', title: 'Dispensado!', confirmButtonText: 'OK' });
                } else {
                    Swal.fire({ icon: 'error', title: 'Falha', text: data.detail || data.status || 'Erro desconhecido', confirmButtonText: 'OK' });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Erro de conexão', confirmButtonText: 'OK' });
            } finally {
                btn.textContent = 'Dispensar';
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', loadInventory);
        document.getElementById('new-quantity').addEventListener('keypress', e => {
            if (e.key === 'Enter') restockProduct();
        });
    </script>
</body>
</html>
